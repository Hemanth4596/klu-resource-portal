<!DOCTYPE html>
<html>
<head>
<title>KLU Portal</title>
<style>
body {background:#0B0F1A;color:white;font-family:Arial;text-align:center;padding-top:80px;}
.card {width:350px;margin:auto;padding:20px;background:rgba(255,255,255,0.05);border-radius:10px;}
input,select,button{width:90%;padding:10px;margin-top:10px;}
.hidden{display:none;}
.terms{height:120px;overflow:auto;font-size:12px;}
</style>
</head>

<body>

<div class="card">

<div id="loginBox">
<h3>Login</h3>
<input id="id" placeholder="Student ID">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p><a onclick="openSignup()">Signup</a></p>
</div>

<div id="signupBox" class="hidden">
<h3>Terms & Privacy</h3>
<div class="terms">
Registration is restricted to valid KLU college IDs only (e.g., 25000XXXXX).<br><br>
This platform is for educational use only.<br>
Unauthorized users are not allowed.<br><br>
For queries: yourgmail@gmail.com
</div>

<label><input type="checkbox" id="agree"> I Agree</label>
<button onclick="next()">Continue</button>
</div>

<div id="formBox" class="hidden">
<h3>Signup</h3>
<input id="sid" placeholder="Student ID">
<input id="spass" type="password" placeholder="Password">
<select id="branch">
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>AIDS</option>
<option>CSIT</option>
</select>
<button onclick="signup()">Create</button>
</div>

</div>

<script>

function openSignup(){
loginBox.classList.add("hidden");
signupBox.classList.remove("hidden");
}

function next(){
if(!agree.checked){alert("Agree first");return;}
signupBox.classList.add("hidden");
formBox.classList.remove("hidden");
}

async function signup(){
await fetch("https://your-app.onrender.com/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id_no:sid.value,password:spass.value,branch:branch.value})
});
alert("Wait for approval");
location.reload();
}

async function login(){
let res=await fetch("https://your-app.onrender.com/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id_no:id.value,password:pass.value})
});
let data=await res.json();
localStorage.setItem("user",JSON.stringify(data));

if(data.role==="admin") window.location="admin.html";
else window.location="dashboard.html";
}

</script>

</body>
</html>
