<!DOCTYPE html>
<html>
<head>
<title>KL Study Hub</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0B0F1A;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(255,255,255,0.05);
}

.logo{
  font-weight:bold;
  font-size:18px;
}

.logout{
  color:#ff4d4d;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:20px;
}

/* SEARCH */
.searchBox{
  text-align:center;
  margin:20px;
}

input,select{
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px cyan;
}

.card.active{
  border:1px solid cyan;
}

/* RESOURCES */
.resources{
  max-height:0;
  overflow:hidden;
  transition:0.3s;
}

.resources.show{
  max-height:300px;
  margin-top:10px;
}

.item{
  margin-top:8px;
}

button{
  margin-left:5px;
  padding:4px 8px;
  cursor:pointer;
}

/* SECTIONS */
.section{
  padding:15px;
}

</style>
</head>

<body>

<div class="nav">
  <div class="logo">
    KL <span style="color:cyan;">STUDY HUB</span>
  </div>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="hero">
  <h2 id="welcome"></h2>
</div>

<div class="searchBox">
  <input id="search" placeholder="Search..." oninput="render()">
  
  <select id="filter" onchange="render()">
    <option value="all">All</option>
    <option value="pdf">PDF</option>
    <option value="link">Links</option>
  </select>
</div>

<div class="section">
  <h3>⭐ Favorites</h3>
  <div id="favorites"></div>
</div>

<div class="section">
  <h3>👁 Recently Viewed</h3>
  <div id="recent"></div>
</div>

<div class="grid" id="grid"></div>

<script>

const { createClient } = supabase;

const client = createClient(
  "https://jkgkswsiunpzwnurqvjq.supabase.co",
  "sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location="index.html";
}

document.getElementById("welcome").innerText =
  "Welcome " + user.id_no + " (" + user.branch + ")";

let allData = [];
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");

const branches = ["CSE","ECE","EEE","AIDS","CSIT"];

async function load(){
  const { data } = await client.from("resources").select("*");
  allData = data;
  render();
}

function render(){

  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  const grid = document.getElementById("grid");
  grid.innerHTML="";

  branches.forEach(b=>{

    const branchData = allData.filter(r=>{
      return r.branch === b &&
      r.title.toLowerCase().includes(search) &&
      (filter==="all" ||
       (filter==="pdf" && r.link.includes(".pdf")) ||
       (filter==="link" && !r.link.includes(".pdf")));
    });

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <h3>${b} (${branchData.length})</h3>
      <div class="resources"></div>
    `;

    const resBox = card.querySelector(".resources");

    if(branchData.length === 0){
      resBox.innerHTML = "<div>No resources</div>";
    } else {
      branchData.forEach(r=>{
        resBox.innerHTML += `
          <div class="item">
            ${getIcon(r.link)} ${r.title}
            <button onclick="openRes('${r.link}')">Open</button>
            <button onclick="copyLink('${r.link}')">Copy</button>
            <button onclick="fav('${r.link}','${r.title}')">⭐</button>
          </div>
        `;
      });
    }

    card.onclick = ()=>{
      document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
        c.querySelector(".resources").classList.remove("show");
      });

      card.classList.add("active");
      resBox.classList.toggle("show");
    };

    grid.appendChild(card);

  });

  renderFav();
  renderRecent();
}

// ICON
function getIcon(link){
  if(link.includes(".pdf")) return "📄";
  return "🔗";
}

// OPEN
function openRes(link){
  window.open(link, "_blank");

  recent.unshift(link);
  recent = [...new Set(recent)].slice(0,5);
  localStorage.setItem("recent", JSON.stringify(recent));
  renderRecent();
}

// COPY
function copyLink(link){
  navigator.clipboard.writeText(link);
  alert("Copied");
}

// FAVORITE
function fav(link,title){
  favorites.push({link,title});
  localStorage.setItem("fav", JSON.stringify(favorites));
  renderFav();
}

// RENDER FAVORITES
function renderFav(){
  const box = document.getElementById("favorites");
  box.innerHTML="";

  favorites.forEach(f=>{
    box.innerHTML += `<div>${f.title}</div>`;
  });
}

// RENDER RECENT
function renderRecent(){
  const box = document.getElementById("recent");
  box.innerHTML="";

  recent.forEach(r=>{
    box.innerHTML += `<div>${r}</div>`;
  });
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location="index.html";
}

load();

</script>

</body>
</html>
