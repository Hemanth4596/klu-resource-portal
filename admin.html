<!DOCTYPE html>
<html>
<head>
<title>KLU Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#0B0F1A;color:white;}

.nav{text-align:center;padding:15px;background:rgba(255,255,255,0.05);}

.tabs{display:flex;justify-content:center;gap:10px;margin-top:20px;}

.tab{padding:10px 20px;cursor:pointer;background:rgba(255,255,255,0.05);border-radius:8px;}
.tab.active{background:cyan;color:black;}

.section{display:none;padding:20px;max-width:750px;margin:auto;}
.section.active{display:block;}

input,select{
  width:100%;padding:10px;margin-top:10px;
  background:rgba(255,255,255,0.05);
  color:white;border-radius:8px;border:none;
}

button{
  width:100%;padding:10px;margin-top:10px;
  background:linear-gradient(45deg,cyan,#00ffaa);
  border:none;border-radius:8px;font-weight:bold;
}

.item{
  background:rgba(255,255,255,0.05);
  padding:12px;margin-top:10px;border-radius:10px;
}
.count{color:cyan;font-size:14px;}
</style>
</head>

<body>

<div class="nav">⚡ KLU Admin Panel</div>

<div class="tabs">
  <div class="tab active" onclick="openTab('users')">Users</div>
  <div class="tab" onclick="openTab('resources')">Resources</div>
</div>

<!-- USERS -->
<div id="users" class="section active">

<h3><i class="fa fa-users"></i> User Management</h3>

<input id="userSearch" placeholder="Search..." oninput="loadUsers()">

<!-- SELECT ALL -->
<label>
  <input type="checkbox" onclick="toggleAll(this)"> Select All
</label>

<!-- BULK ACTIONS -->
<button onclick="approveSelected()">Approve Selected</button>
<button onclick="blockSelected()">Block Selected</button>
<button onclick="deleteSelected()">Delete Selected</button>

<h4>🟡 Pending <span id="pendingCount" class="count"></span></h4>
<div id="pendingList"></div>

<h4>🟢 Approved <span id="approvedCount" class="count"></span></h4>
<div id="approvedList"></div>

<h4>🔴 Blocked <span id="blockedCount" class="count"></span></h4>
<div id="blockedList"></div>

</div>

<!-- RESOURCES -->
<div id="resources" class="section">

<h3><i class="fa fa-upload"></i> Upload Resource</h3>

<input id="title" placeholder="Title">
<input id="link" placeholder="Optional Link">
<input type="file" id="file">

<select id="branch">
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>AIDS</option>
<option>CSIT</option>
</select>

<button onclick="add()">Upload</button>

<input id="search" placeholder="Search..." oninput="loadResources()">

<div id="resList"></div>

</div>

<script>

const { createClient } = supabase;

const client = createClient(
"https://jkgkswsiunpzwnurqvjq.supabase.co",
"sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

// ACCESS CONTROL
const user = JSON.parse(localStorage.getItem("user"));
if(!user || (user.role !== "admin" && user.role !== "coadmin")){
  window.location="index.html";
}

// TAB SWITCH
function openTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

  event.target.classList.add("active");
  document.getElementById(name).classList.add("active");
}

// SELECT ALL
function toggleAll(source){
  document.querySelectorAll(".userCheck").forEach(cb=>{
    cb.checked = source.checked;
  });
}

// GET SELECTED
function getSelectedUsers(){
  const users=[];
  document.querySelectorAll(".userCheck:checked").forEach(cb=>{
    users.push(cb.value);
  });
  return users;
}

// LOAD USERS
async function loadUsers(){

  const { data } = await client.from("users").select("*");

  const search = userSearch.value.toLowerCase();

  pendingList.innerHTML="";
  approvedList.innerHTML="";
  blockedList.innerHTML="";

  let p=0,a=0,b=0;

  data.forEach(u=>{

    if(!u.id_no.toLowerCase().includes(search)) return;

    const html = `
    <div class="item">
      <input type="checkbox" class="userCheck" value="${u.id_no}">
      <b>${u.id_no}</b> (${u.branch})<br>
      ${u.status}<br>

      ${u.status==="pending"?`<button onclick="approve('${u.id_no}')">Approve</button>`:""}
      ${u.status!=="blocked"?`<button onclick="blockUser('${u.id_no}')">Block</button>`:""}
      ${u.status==="blocked"?`<button onclick="unblockUser('${u.id_no}')">Unblock</button>`:""}
    </div>`;

    if(u.status==="pending"){p++;pendingList.innerHTML+=html;}
    else if(u.status==="approved"){a++;approvedList.innerHTML+=html;}
    else{b++;blockedList.innerHTML+=html;}

  });

  pendingCount.innerText=`(${p})`;
  approvedCount.innerText=`(${a})`;
  blockedCount.innerText=`(${b})`;
}

// SINGLE ACTIONS
async function approve(id){
  await client.from("users").update({status:"approved"}).eq("id_no",id);
  loadUsers();
}
async function blockUser(id){
  await client.from("users").update({status:"blocked"}).eq("id_no",id);
  loadUsers();
}
async function unblockUser(id){
  await client.from("users").update({status:"approved"}).eq("id_no",id);
  loadUsers();
}

// BULK ACTIONS
async function approveSelected(){
  const users=getSelectedUsers();
  if(users.length===0)return alert("Select users");
  await client.from("users").update({status:"approved"}).in("id_no",users);
  loadUsers();
}

async function blockSelected(){
  const users=getSelectedUsers();
  if(users.length===0)return alert("Select users");
  await client.from("users").update({status:"blocked"}).in("id_no",users);
  loadUsers();
}

async function deleteSelected(){
  const users=getSelectedUsers();
  if(users.length===0)return alert("Select users");
  if(!confirm("Delete selected users?"))return;
  await client.from("users").delete().in("id_no",users);
  loadUsers();
}

// RESOURCE ADD
async function add(){

  if(!title.value) return alert("Enter title");

  let fileUrl = link.value;

  const fileInput=document.getElementById("file");

  if(fileInput.files.length>0){
    const file=fileInput.files[0];
    const name=Date.now()+"_"+file.name;

    const {error}=await client.storage.from("files").upload(name,file);

    if(error)return alert("Upload failed");

    const {data}=client.storage.from("files").getPublicUrl(name);
    fileUrl=data.publicUrl;
  }

  if(!fileUrl) return alert("Provide link or file");

  await client.from("resources").insert([{title:title.value,link:fileUrl,branch:branch.value}]);

  title.value="";link.value="";fileInput.value="";
  loadResources();
}

// LOAD RESOURCES
async function loadResources(){

  const {data}=await client.from("resources").select("*");

  const s=search.value.toLowerCase();

  resList.innerHTML="";

  data.forEach(r=>{
    if(r.title.toLowerCase().includes(s)){
      resList.innerHTML+=`
      <div class="item">
        ${r.title}<br>
        <a href="${r.link}" target="_blank">Open</a>
      </div>`;
    }
  });
}

// INIT
loadUsers();
loadResources();

</script>

</body>
</html>
