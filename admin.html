<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0B0F1A;
  color:white;
}

/* NAV */
.nav {
  padding:15px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  font-size:18px;
}

/* TABS */
.tabs {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.tab {
  padding:10px 20px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  border-radius:8px;
}

.tab.active {
  background:cyan;
  color:black;
}

/* SECTION */
.section {
  display:none;
  padding:20px;
  max-width:600px;
  margin:auto;
}

.section.active {
  display:block;
}

/* INPUTS */
input, select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.item {
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="nav">Admin Panel</div>

<div class="tabs">
  <div class="tab active" onclick="openTab('stats')">Stats</div>
  <div class="tab" onclick="openTab('users')">Users</div>
  <div class="tab" onclick="openTab('resources')">Resources</div>
</div>

<!-- STATS -->
<div id="stats" class="section active">
  <h3>Statistics</h3>
  <p>Total Users: <span id="userCount"></span></p>
  <p>Total Resources: <span id="resCount"></span></p>
</div>

<!-- USERS -->
<div id="users" class="section">
  <h3>Pending Users</h3>
  <div id="userList"></div>
</div>

<!-- RESOURCES -->
<div id="resources" class="section">

  <h3>Add Resource</h3>

  <input id="title" placeholder="Title">
  <input id="link" placeholder="Link">

  <select id="branch">
    <option>CSE</option>
    <option>ECE</option>
    <option>EEE</option>
    <option>AIDS</option>
    <option>CSIT</option>
  </select>

  <button onclick="add()">Upload</button>

  <h3>All Resources</h3>
  <input id="search" placeholder="Search..." oninput="loadResources()">

  <div id="resList"></div>

</div>

<script>

const { createClient } = supabase;

const client = createClient(
  "https://jkgkswsiunpzwnurqvjq.supabase.co",
  "sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

// TAB SWITCH
function openTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

  event.target.classList.add("active");
  document.getElementById(name).classList.add("active");
}

// LOAD STATS
async function loadStats(){
  const users = await client.from("users").select("*");
  const res = await client.from("resources").select("*");

  document.getElementById("userCount").innerText = users.data.length;
  document.getElementById("resCount").innerText = res.data.length;
}

// LOAD USERS
async function loadUsers(){

  const { data } = await client
    .from("users")
    .select("*")
    .eq("status","pending");

  const list = document.getElementById("userList");
  list.innerHTML="";

  data.forEach(u=>{
    list.innerHTML += `
      <div class="item">
        ${u.id_no} (${u.branch})
        <button onclick="approve('${u.id_no}')">Approve</button>
      </div>
    `;
  });
}

// APPROVE
async function approve(id){
  await client.from("users")
    .update({status:"approved"})
    .eq("id_no",id);

  loadUsers();
}

// ADD RESOURCE
async function add(){

  await client.from("resources").insert([{
    title: title.value,
    link: link.value,
    branch: branch.value
  }]);

  title.value="";
  link.value="";
  loadResources();
}

// LOAD RESOURCES
async function loadResources(){

  const { data } = await client.from("resources").select("*");

  const search = document.getElementById("search").value.toLowerCase();

  const list = document.getElementById("resList");
  list.innerHTML="";

  data.forEach(r=>{

    if(r.title.toLowerCase().includes(search)){

      list.innerHTML += `
        <div class="item">
          <b>${r.title}</b> (${r.branch})<br>
          <a href="${r.link}" target="_blank">Open</a><br>
          <button onclick="del('${r.id}')">Delete</button>
        </div>
      `;
    }

  });
}

// DELETE
async function del(id){
  await client.from("resources").delete().eq("id",id);
  loadResources();
}

// INIT
loadStats();
loadUsers();
loadResources();

</script>

</body>
</html>
